services:
  neo4j:
    image: neo4j:5.26-community
    container_name: asd-kgrag-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: "neo4j/asd-kgrag-local"
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_dbms_security_procedures_allowlist: "apoc.*"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./data/processed/neo4j_import_full_ab_nonbook_v5_current_revalidated:/import/asd_kgrag:ro

  qdrant:
    image: qdrant/qdrant:latest
    container_name: asd-kgrag-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  qa-api:
    build:
      context: .
      dockerfile: Dockerfile.qa
    container_name: asd-kgrag-qa
    ports:
      - "8010:8010"
    env_file:
      - .env
    depends_on:
      - neo4j
      - qdrant

volumes:
  neo4j_data:
  neo4j_logs:
  qdrant_data:
